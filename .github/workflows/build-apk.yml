name: 👑 Build APK - Ultra Pro

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'Dark AI'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.darkai.app)'
        required: true
        default: 'com.darkai.app'
        type: string
      app_color:
        description: '🎨 لون خلفية التطبيق (مثال: #000000 للأسود)'
        required: true
        default: '#000000'
        type: string
      icon_file:
        description: '🖼️ اسم ملف الأيقونة PNG (ضع الملف في مجلد المشروع)'
        required: true
        default: 'icon.png'
        type: string
      site_folder:
        description: '📁 مجلد موقع الويب (اتركه فارغاً للمجلد الرئيسي)'
        required: false
        default: ''
        type: string
      splash_duration:
        description: '⏱️ مدة شاشة البداية (بالمللي ثانية)'
        required: false
        default: '2000'
        type: string
      version_name:
        description: '📌 إصدار التطبيق (مثال: 1.0.0)'
        required: false
        default: '1.0.0'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 👑 بناء تطبيق ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل المشروع بالكامل
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 تثبيت Capacitor والأدوات
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update
          sudo apt-get install -y imagemagick tree

      - name: 📁 نسخ جميع ملفات المشروع إلى www
        run: |
          echo "🔍 جاري نسخ جميع ملفات المشروع..."
          
          # تنظيف مجلد www القديم
          rm -rf www
          mkdir -p www
          
          # تحديد مجلد المصدر
          SOURCE_DIR="${{ github.event.inputs.site_folder }}"
          if [ -z "$SOURCE_DIR" ]; then
            SOURCE_DIR="."
          fi
          
          echo "📁 مجلد المصدر: $SOURCE_DIR"
          
          # نسخ جميع الملفات والمجلدات مع الحفاظ على الهيكل
          if [ "$SOURCE_DIR" = "." ]; then
            # نسخ من المجلد الرئيسي
            echo "📄 نسخ من المجلد الرئيسي..."
            
            # قائمة الملفات والمجلدات المراد استبعادها
            EXCLUDE_DIRS=".git .github node_modules android ios www .vscode .idea"
            EXCLUDE_FILES="package.json package-lock.json capacitor.config.json .gitignore .DS_Store"
            
            # نسخ جميع الملفات والمجلدات باستثناء المستبعدة
            for item in ./*; do
              basename=$(basename "$item")
              should_exclude=false
              
              # التحقق من المجلدات المستبعدة
              for exclude in $EXCLUDE_DIRS; do
                if [ "$basename" = "$exclude" ]; then
                  should_exclude=true
                  break
                fi
              done
              
              # التحقق من الملفات المستبعدة
              for exclude in $EXCLUDE_FILES; do
                if [ "$basename" = "$exclude" ]; then
                  should_exclude=true
                  break
                fi
              done
              
              if [ "$should_exclude" = false ]; then
                echo "  📄 نسخ: $basename"
                cp -r "$item" www/ 2>/dev/null || true
              fi
            done
            
            # نسخ الملفات المخفية (باستثناء .git)
            shopt -s dotglob
            for item in ./*; do
              basename=$(basename "$item")
              if [[ "$basename" != "." && "$basename" != ".." && "$basename" != ".git" && "$basename" != ".github" && "$basename" != ".vscode" && "$basename" != ".idea" ]]; then
                if [[ "$basename" == .* ]]; then
                  echo "  📄 نسخ ملف مخفي: $basename"
                  cp -r "$item" www/ 2>/dev/null || true
                fi
              fi
            done
            shopt -u dotglob
            
          else
            # نسخ من مجلد محدد
            if [ -d "$SOURCE_DIR" ]; then
              echo "✅ المجلد $SOURCE_DIR موجود"
              cp -r "$SOURCE_DIR"/* www/ 2>/dev/null || true
              cp -r "$SOURCE_DIR"/.* www/ 2>/dev/null || true
            else
              echo "❌ المجلد $SOURCE_DIR غير موجود!"
              exit 1
            fi
          fi
          
          # حذف الملفات غير المرغوب فيها من www
          echo ""
          echo "🧹 تنظيف الملفات غير المرغوب فيها..."
          rm -rf www/.git www/.github www/node_modules 2>/dev/null || true
          rm -rf www/.vscode www/.idea 2>/dev/null || true
          rm -f www/package.json www/package-lock.json 2>/dev/null || true
          rm -f www/capacitor.config.json 2>/dev/null || true
          rm -f www/icon.png www/icon.jpg www/icon.jpeg 2>/dev/null || true
          
          echo ""
          echo "📊 إحصائيات مجلد www:"
          echo "  📁 عدد الملفات: $(find www -type f 2>/dev/null | wc -l)"
          echo "  📂 عدد المجلدات: $(find www -type d 2>/dev/null | wc -l)"
          echo "  💾 الحجم الإجمالي: $(du -sh www 2>/dev/null | cut -f1)"
          
          # عرض هيكل الملفات
          echo ""
          echo "📂 هيكل مجلد www:"
          tree -L 2 www/ || find www -type f | head -20
          
          # التحقق من وجود index.html
          if [ -f "www/index.html" ]; then
            echo ""
            echo "✅ تم العثور على index.html"
          else
            echo ""
            echo "⚠️ تحذير: لم يتم العثور على index.html!"
            echo "🔍 البحث عن ملفات HTML:"
            find www -name "*.html" | head -10
          fi

      - name: 📄 إنشاء package.json للتطبيق
        run: |
          cat > package.json << 'EOF'
          {
            "name": "${{ github.event.inputs.app_name }}",
            "version": "1.0.0",
            "description": "تطبيق ${{ github.event.inputs.app_name }}",
            "main": "www/index.html",
            "scripts": {
              "build": "echo 'Build complete'"
            },
            "dependencies": {
              "@capacitor/android": "^5.0.0",
              "@capacitor/core": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/filesystem": "^5.0.0",
              "@capacitor/app": "^5.0.0",
              "@capacitor/status-bar": "^5.0.0",
              "@capacitor/splash-screen": "^5.0.0",
              "@capacitor/keyboard": "^5.0.0",
              "@capacitor/share": "^5.0.0"
            }
          }
          EOF

      - name: ⚙️ إعداد Capacitor مع دعم كامل
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "allowNavigation": ["*"],
              "cleartext": true,
              "hostname": "localhost"
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true,
              "keyboardStyle": "DARK",
              "resizeOnFullScreen": true,
              "useLegacyBridge": false
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 0,
                "launchAutoHide": true,
                "launchFadeOutDuration": 0,
                "backgroundColor": "${{ github.event.inputs.app_color }}",
                "androidSplashResourceName": "splash",
                "androidScaleType": "FIT_CENTER",
                "showSpinner": false,
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "Keyboard": {
                "resize": "body",
                "style": "DARK",
                "resizeOnFullScreen": true
              },
              "StatusBar": {
                "style": "LIGHT",
                "backgroundColor": "${{ github.event.inputs.app_color }}",
                "overlaysWebView": false
              }
            }
          }
          EOF

      - name: 📦 تثبيت المكتبات
        run: npm install

      - name: 🤖 إنشاء مشروع Android
        run: npx cap add android

      - name: 🎨 إنشاء الأيقونات بجميع المقاسات
        run: |
          ICON_FILE="${{ github.event.inputs.icon_file }}"
          
          # البحث عن ملف الأيقونة
          if [ ! -f "$ICON_FILE" ]; then
            echo "❌ خطأ: ملف الأيقونة $ICON_FILE غير موجود!"
            echo "🔍 البحث عن ملفات PNG في المشروع:"
            find . -name "*.png" -not -path './node_modules/*' -not -path './.git/*' | head -10
            exit 1
          fi
          
          echo "✅ تم العثور على ملف الأيقونة: $ICON_FILE"
          echo "📏 حجم الصورة الأصلي: $(identify -format '%wx%h' $ICON_FILE)"
          
          # إنشاء جميع مجلدات المقاسات
          mkdir -p android/app/src/main/res/mipmap-ldpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/drawable
          
          echo "🎨 جاري إنشاء الأيقونات..."
          convert $ICON_FILE -resize 36x36   android/app/src/main/res/mipmap-ldpi/ic_launcher.png
          convert $ICON_FILE -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert $ICON_FILE -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert $ICON_FILE -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert $ICON_FILE -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert $ICON_FILE -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          cp $ICON_FILE android/app/src/main/res/drawable/ic_launcher_foreground.png
          
          echo "✅ تم إنشاء جميع الأيقونات بنجاح!"

      - name: 🎨 إنشاء Splash Screen
        run: |
          ICON_FILE="${{ github.event.inputs.icon_file }}"
          APP_COLOR="${{ github.event.inputs.app_color }}"
          
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/values
          
          # إنشاء صورة Splash
          convert $ICON_FILE -resize 250x250 -background "$APP_COLOR" -gravity center -extent 300x300 \
                  android/app/src/main/res/drawable/splash.png
          
          # إنشاء ملفات XML
          cat > android/app/src/main/res/drawable/splash_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape>
                      <solid android:color="${APP_COLOR}" />
                  </shape>
              </item>
              <item
                  android:gravity="center"
                  android:width="250dp"
                  android:height="250dp">
                  <bitmap
                      android:src="@drawable/splash"
                      android:gravity="center"
                      android:filter="true" />
              </item>
          </layer-list>
          EOF
          
          cat > android/app/src/main/res/values/styles.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">${APP_COLOR}</item>
                  <item name="colorPrimaryDark">${APP_COLOR}</item>
                  <item name="colorAccent">${APP_COLOR}</item>
                  <item name="android:statusBarColor">${APP_COLOR}</item>
                  <item name="android:navigationBarColor">${APP_COLOR}</item>
                  <item name="android:windowBackground">@color/windowBackground</item>
                  <item name="android:windowSoftInputMode">adjustResize</item>
              </style>
              
              <style name="AppTheme.Splash" parent="AppTheme">
                  <item name="android:windowBackground">@drawable/splash_background</item>
                  <item name="android:statusBarColor">${APP_COLOR}</item>
                  <item name="android:navigationBarColor">${APP_COLOR}</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
                  <item name="android:backgroundDimEnabled">false</item>
              </style>
          </resources>
          EOF
          
          cat > android/app/src/main/res/values/colors.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="windowBackground">${APP_COLOR}</color>
              <color name="primaryColor">${APP_COLOR}</color>
          </resources>
          EOF
          
          echo "✅ تم إنشاء Splash Screen بنجاح"

      - name: 🔄 مزامنة المشروع والتحقق من الملفات
        run: |
          echo "🔄 جاري مزامنة الملفات..."
          npx cap sync android
          
          echo ""
          echo "🔍 التحقق من محتويات assets:"
          if [ -d "android/app/src/main/assets" ]; then
            echo "  📁 عدد الملفات في assets: $(find android/app/src/main/assets -type f 2>/dev/null | wc -l)"
            echo "  💾 حجم assets: $(du -sh android/app/src/main/assets 2>/dev/null | cut -f1)"
            echo ""
            echo "  📂 أول 20 ملف في assets:"
            find android/app/src/main/assets -type f 2>/dev/null | head -20
          else
            echo "  ❌ مجلد assets غير موجود!"
            exit 1
          fi
          
          # التحقق من وجود index.html في assets
          if [ -f "android/app/src/main/assets/public/index.html" ] || [ -f "android/app/src/main/assets/index.html" ]; then
            echo ""
            echo "✅ تم العثور على index.html في assets"
          else
            echo ""
            echo "⚠️ تحذير: لم يتم العثور على index.html في assets!"
            echo "🔍 البحث عن index.html:"
            find android/app/src/main/assets -name "index.html" 2>/dev/null
          fi

      - name: 🔨 بناء تطبيق APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # التحقق من وجود APK
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ تم بناء APK بنجاح"
            echo "📱 حجم APK: $(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
          else
            echo "❌ فشل بناء APK"
            exit 1
          fi

      - name: 📤 رفع APK إلى Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 🚀 إنشاء Release ورفع APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name }}-${{ github.run_number }}
          name: "👑 ${{ github.event.inputs.app_name }} v${{ github.event.inputs.version_name }} (Build #${{ github.run_number }})"
          body: |
            ## 👑 ${{ github.event.inputs.app_name }}
            
            ### 📋 معلومات التطبيق
            - **الإصدار**: ${{ github.event.inputs.version_name }}
            - **Build**: #${{ github.event.run_number }}
            - **التاريخ**: $(date +%Y-%m-%d)
            
            ### ✨ المميزات
            - 🖼️ صورة واحدة فقط عند الفتح (بدون Spinner)
            - ⚡ فتح سريع ومباشر
            - 📥 دعم تحميل الصور داخل التطبيق
            - ⌨️ دعم الكيبورد بشكل كامل
            - 🌐 يدعم جميع محتويات الويب
            - 💾 صلاحيات تخزين كاملة
            
            ### 📥 التحميل
            يمكنك تحميل ملف APK من الأسفل 👇
            
            ---
            *Built with ❤️ using GitHub Actions*
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 اكتمال البناء
        run: |
          echo "╔════════════════════════════════════════════╗"
          echo "║  👑  تم بناء التطبيق بنجاح!              ║"
          echo "║  🖼️  تصميم فاخر                          ║"
          echo "║  📥  دعم تحميل الصور                     ║"
          echo "║  🚀  تم الرفع إلى Releases              ║"
          echo "╚════════════════════════════════════════════╝"
          echo ""
          echo "📱 اسم التطبيق: ${{ github.event.inputs.app_name }}"
          echo "📌 الإصدار: ${{ github.event.inputs.version_name }}"
          echo "⬛ لون الخلفية: ${{ github.event.inputs.app_color }}"
          echo ""
          echo "📥 يمكنك تحميل الـ APK من:"
          echo "  🚀 Releases (رابط مباشر)"
          echo "  📦 Artifacts (نسخة احتياطية)"
