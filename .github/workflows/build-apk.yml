# ╔══════════════════════════════════════════════════════════╗
# ║      👑 Dark AI - بناء APK (المرحلة الثالثة)         ║
# ║              يعمل يدوياً فقط                           ║
# ╚══════════════════════════════════════════════════════════╝

name: 🚀 Build APK - المرحلة الثالثة

# ═══════════════════════════ المشغلات ═══════════════════════════
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'Dark AI'
        type: string
        
      app_id:
        description: '🆔 App ID'
        required: true
        default: 'com.darkai.app'
        type: string
        
      app_color:
        description: '🎨 لون التطبيق'
        required: true
        default: '#000000'
        type: string
        
      version_name:
        description: '📌 الإصدار'
        required: true
        default: '1.0.0'
        type: string
        
      icon_file:
        description: '🖼️ ملف الأيقونة'
        required: true
        default: 'icon.png'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 👑 بناء APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 تحميل المستودع
        uses: actions/checkout@v4
        
      - name: 📥 تحميل القالب
        uses: actions/download-artifact@v4
        with:
          name: android-template
          
      - name: 📦 فك القالب
        run: |
          tar -xzf android-template.tar.gz
          cp -r template/* .
          rm -rf template android-template.tar.gz

      - name: ☕ Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ الأدوات
        run: |
          npm install -g @capacitor/cli
          sudo apt-get install -y -qq imagemagick
          npm install

      - name: ⚙️ تحديث الإعدادات
        run: |
          # تحديث capacitor.config.json
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "allowNavigation": ["*"],
              "cleartext": true,
              "hostname": "localhost"
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true,
              "backgroundColor": "${{ github.event.inputs.app_color }}"
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 0,
                "launchAutoHide": true,
                "backgroundColor": "${{ github.event.inputs.app_color }}",
                "androidSplashResourceName": "splash",
                "androidScaleType": "CENTER_CROP",
                "showSpinner": false,
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "Keyboard": {
                "resize": "body",
                "style": "DARK"
              },
              "StatusBar": {
                "style": "LIGHT",
                "backgroundColor": "${{ github.event.inputs.app_color }}"
              }
            }
          }
          EOF

      - name: 🎨 الأيقونات و Splash
        run: |
          ICON="${{ github.event.inputs.icon_file }}"
          COLOR="${{ github.event.inputs.app_color }}"
          
          [ ! -f "$ICON" ] && ICON=$(find . -name "*.png" -not -path './node_modules/*' -not -path './android/*' | head -1)
          
          if [ -f "$ICON" ]; then
            rm -rf android/app/src/main/res/mipmap-* android/app/src/main/res/drawable/ic_launcher_*
            
            for dir in mipmap-ldpi mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi mipmap-anydpi-v26 drawable; do
              mkdir -p "android/app/src/main/res/$dir"
            done
            
            convert "$ICON" -resize 36x36   android/app/src/main/res/mipmap-ldpi/ic_launcher.png
            convert "$ICON" -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert "$ICON" -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert "$ICON" -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert "$ICON" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert "$ICON" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            
            cp "$ICON" android/app/src/main/res/drawable/ic_launcher_foreground.png
            
            # Splash
            mkdir -p android/app/src/main/res/{drawable,values}
            convert "$ICON" -resize 250x250 -background "$COLOR" -gravity center -extent 300x300 android/app/src/main/res/drawable/splash.png
            
            # Splash background
            cat > android/app/src/main/res/drawable/splash_background.xml << XML
            <?xml version="1.0" encoding="utf-8"?>
            <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
                <item><shape><solid android:color="${COLOR}"/></shape></item>
                <item android:gravity="center" android:width="250dp" android:height="250dp">
                    <bitmap android:src="@drawable/splash" android:gravity="center"/>
                </item>
            </layer-list>
            XML
            
            # Styles
            cat > android/app/src/main/res/values/styles.xml << XML
            <?xml version="1.0" encoding="utf-8"?>
            <resources>
                <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                    <item name="colorPrimary">${COLOR}</item>
                    <item name="colorPrimaryDark">${COLOR}</item>
                    <item name="android:statusBarColor">${COLOR}</item>
                    <item name="android:navigationBarColor">${COLOR}</item>
                    <item name="android:windowBackground">${COLOR}</item>
                </style>
                <style name="AppTheme.Splash" parent="AppTheme">
                    <item name="android:windowBackground">@drawable/splash_background</item>
                    <item name="android:statusBarColor">${COLOR}</item>
                    <item name="android:navigationBarColor">${COLOR}</item>
                    <item name="android:windowFullscreen">true</item>
                </style>
            </resources>
            XML
            
            # Adaptive icon
            cat > android/app/src/main/res/drawable/ic_launcher_background.xml << XML
            <?xml version="1.0" encoding="utf-8"?>
            <shape><solid android:color="${COLOR}"/></shape>
            XML
            
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << XML
            <?xml version="1.0" encoding="utf-8"?>
            <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
                <background android:drawable="@drawable/ic_launcher_background"/>
                <foreground android:drawable="@drawable/ic_launcher_foreground"/>
            </adaptive-icon>
            XML
            
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << XML
            <?xml version="1.0" encoding="utf-8"?>
            <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
                <background android:drawable="@drawable/ic_launcher_background"/>
                <foreground android:drawable="@drawable/ic_launcher_foreground"/>
            </adaptive-icon>
            XML
            
            echo "✅ التصميم جاهز"
          fi

      - name: 🔧 AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          [ -f "$MANIFEST" ] && sed -i 's|<application|<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true" android:requestLegacyExternalStorage="true" android:theme="@style/AppTheme.Splash"|' "$MANIFEST"

      - name: 🔄 مزامنة
        run: npx cap sync android

      - name: 🔨 بناء APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
          APK="app/build/outputs/apk/debug/app-debug.apk"
          [ -f "$APK" ] && cp "$APK" ../app-debug.apk && echo "✅ APK جاهز: $(du -h ../app-debug.apk | cut -f1)"

      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version_name }}
          path: app-debug.apk
          retention-days: 90

      - name: 🚀 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name }}-${{ github.run_number }}
          name: "👑 ${{ github.event.inputs.app_name }} v${{ github.event.inputs.version_name }}"
          files: app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 اكتمال
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║     🎉 تم بناء APK بنجاح!          ║"
          echo "║     📱 ${{ github.event.inputs.app_name }}"
          echo "║     📌 v${{ github.event.inputs.version_name }}"
          echo "║     🔗 اذهب إلى Releases للتحميل    ║"
          echo "╚══════════════════════════════════════╝"
