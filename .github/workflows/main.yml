name: Create Android Project

on:
  workflow_dispatch:

jobs:
  create-project:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Run scraper.py to create project
        run: python scraper.py

      - name: 📤 Upload project files
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-Android-Project
          path: MyApp/
