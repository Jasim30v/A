<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🌸 MNAENCA | دردشة</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{
            --glass:rgba(219,39,119,0.03);
            --border:rgba(219,39,119,0.12);
            --accent:#db2777;
            --accent2:#ec4899;
            --bg:#0a0205;
            --card:rgba(219,39,119,0.06);
            --danger:#ef4444;
            --success:#22c55e;
            --warning:#f59e0b;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background:var(--bg);
            color:#fff;
            -webkit-tap-highlight-color:transparent;
            user-select:none;
            -webkit-user-select:none;
            height:100vh;
            display:flex;
            flex-direction:column;
        }
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        
        .spinner{
            width:36px;height:36px;
            border:3px solid rgba(219,39,119,0.2);
            border-top-color:var(--accent);
            border-radius:50%;
            animation:spin 0.7s linear infinite;
            margin:30px auto;
        }
        
        .header{
            display:flex;align-items:center;gap:12px;
            padding:16px;border-bottom:1px solid var(--border);
            background:rgba(10,2,5,0.8);
            backdrop-filter:blur(20px);
            flex-shrink:0;
        }
        .btn-back{
            background:rgba(219,39,119,0.1);
            border:1px solid var(--border);
            width:38px;height:38px;
            border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            color:#fff;cursor:pointer;font-size:16px;
            transition:all 0.3s;
        }
        .btn-back:hover{background:rgba(219,39,119,0.25);}
        
        .msgs{
            flex:1;overflow-y:auto;padding:16px;
            display:flex;flex-direction:column;gap:8px;
        }
        .bubble{
            max-width:80%;padding:10px 16px;
            border-radius:20px;word-break:break-word;
            font-size:14px;position:relative;
            animation:msgIn 0.3s ease;
        }
        @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .bubble.sent{
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            align-self:flex-end;color:#fff;
        }
        .bubble.received{
            background:rgba(219,39,119,0.06);
            align-self:flex-start;
            border:1px solid rgba(219,39,119,0.1);
        }
        .bubble img{
            max-width:200px;border-radius:12px;
            cursor:pointer;margin-top:4px;
        }
        .bubble audio{
            max-width:200px;margin-top:4px;
            border-radius:12px;background:rgba(0,0,0,0.3);
        }
        .bubble .time{
            font-size:9px;opacity:0.6;margin-top:4px;
        }
        
        /* 🟢 رسالة حالة الإرسال */
        .bubble.status-msg{
            align-self:center;
            background:rgba(219,39,119,0.1);
            border:1px solid rgba(219,39,119,0.2);
            color:var(--accent2);
            font-size:12px;
            padding:8px 16px;
            border-radius:20px;
            opacity:0.8;
            text-align:center;
            animation:statusPop 0.3s ease;
        }
        @keyframes statusPop{
            0%{transform:scale(0.8);opacity:0}
            100%{transform:scale(1);opacity:0.8}
        }
        
        .input-bar{
            display:flex;gap:10px;padding:12px;
            background:rgba(10,2,5,0.95);
            backdrop-filter:blur(20px);
            border-top:1px solid var(--border);
            align-items:center;flex-shrink:0;
        }
        .input-bar input{
            flex:1;padding:12px 16px;border-radius:30px;
            background:var(--glass);
            border:1px solid var(--border);
            color:#fff;font-size:14px;outline:none;
            transition:all 0.3s;
        }
        .input-bar input:focus{
            border-color:var(--accent);
            box-shadow:0 0 15px rgba(219,39,119,0.15);
        }
        .btn-icon{
            width:42px;height:42px;
            background:rgba(219,39,119,0.1);
            border:1px solid var(--border);
            border-radius:50%;color:#fff;
            cursor:pointer;font-size:18px;
            display:flex;align-items:center;justify-content:center;
            transition:all 0.3s;
        }
        .btn-icon:hover{background:rgba(219,39,119,0.25);}
        .btn-send{
            width:42px;height:42px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            border:none;border-radius:50%;
            color:#fff;cursor:pointer;font-size:18px;
            display:flex;align-items:center;justify-content:center;
            transition:all 0.3s;
            box-shadow:0 4px 15px rgba(219,39,119,0.4);
        }
        .btn-send:hover{transform:scale(1.1);box-shadow:0 8px 25px rgba(219,39,119,0.6);}
        .btn-record{
            width:42px;height:42px;
            background:linear-gradient(135deg,#ef4444,#dc2626);
            border:none;border-radius:50%;
            color:#fff;cursor:pointer;font-size:18px;
            display:flex;align-items:center;justify-content:center;
            animation:pulse 1.5s ease-in-out infinite;
        }
        .btn-record.stop{
            animation:none;
            background:rgba(219,39,119,0.1);
            border:1px solid var(--border);
        }
        .conv-item{
            display:flex;align-items:center;gap:12px;
            padding:14px;border-bottom:1px solid var(--border);
            cursor:pointer;transition:background 0.2s;
        }
        .conv-item:hover{background:rgba(219,39,119,0.04);}
        .chat-avatar{
            width:40px;height:40px;border-radius:50%;
            overflow:hidden;border:2px solid rgba(219,39,119,0.3);
        }
        .chat-avatar img{width:100%;height:100%;object-fit:cover;}
        .online-indicator{
            width:10px;height:10px;background:#22c55e;
            border-radius:50%;display:inline-block;margin-left:6px;
        }
        .toast-msg{
            position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
            background:rgba(10,2,5,0.95);padding:12px 24px;border-radius:30px;
            z-index:10000;border:1px solid rgba(219,39,119,0.3);font-size:13px;
            opacity:0;transition:opacity 0.3s;pointer-events:none;
            white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);
        }
        .toast-msg.show{opacity:1}
    </style>
</head>
<body>

<!-- 🔄 شاشة التحميل -->
<div id="loader" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
    <div class="spinner"></div>
    <span style="color:rgba(255,255,255,0.5)">🌸 تحميل المحادثات...</span>
</div>

<!-- 📋 قائمة المحادثات -->
<div id="convView" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div class="header">
        <button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></button>
        <h2 style="font-size:18px"><i class="fas fa-comments" style="color:var(--accent2)"></i> المحادثات</h2>
    </div>
    <div id="convList" style="flex:1;overflow-y:auto"></div>
</div>

<!-- 💬 نافذة الدردشة -->
<div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div class="header">
        <button class="btn-back" onclick="showConvs()"><i class="fas fa-arrow-right"></i></button>
        <div class="chat-avatar" id="chatAvatar"></div>
        <div>
            <h3 id="chatName" style="font-size:15px">محادثة</h3>
            <span id="chatOnline" style="font-size:11px;opacity:0.5"></span>
        </div>
    </div>
    
    <div class="msgs" id="msgsList">
        <!-- الرسائل ستظهر هنا -->
    </div>
    
    <div class="input-bar">
        <button class="btn-icon" onclick="sendImage()" title="📷 إرسال صورة">
            <i class="fas fa-image"></i>
        </button>
        <button class="btn-icon" id="btnRecord" onclick="toggleRecording()" title="🎤 تسجيل صوتي">
            <i class="fas fa-microphone"></i>
        </button>
        <input type="text" id="msgInput" placeholder="💬 اكتب رسالة..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="btn-send" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        <button class="btn-icon" onclick="copyChat()" title="📋 نسخ المحادثة">
            <i class="fas fa-copy"></i>
        </button>
    </div>
</div>

<div class="toast-msg" id="toastMsg">✅ تم</div>

<script src="firebase-config.js"></script>
<script>
    let currentUser = null;
    let allUsers = {};
    let chatUserId = null;
    let mediaRecorder = null;
    let audioChunks = [];
    
    // 🟢 دالة إظهار رسالة حالة داخل الدردشة
    function showStatusInChat(message) {
        const ml = document.getElementById('msgsList');
        if (!ml) return;
        const statusDiv = document.createElement('div');
        statusDiv.className = 'bubble status-msg';
        statusDiv.textContent = message;
        statusDiv.id = 'statusMsg_' + Date.now();
        ml.appendChild(statusDiv);
        ml.scrollTop = ml.scrollHeight;
        
        // إزالة الرسالة بعد 3 ثواني
        setTimeout(() => {
            if (statusDiv && statusDiv.parentNode) {
                statusDiv.style.opacity = '0';
                statusDiv.style.transition = 'opacity 0.5s';
                setTimeout(() => {
                    if (statusDiv && statusDiv.parentNode) {
                        statusDiv.parentNode.removeChild(statusDiv);
                    }
                }, 500);
            }
        }, 3000);
    }
    
    // 📍 التحقق من تسجيل الدخول
    auth.onAuthStateChanged(async (u) => {
        if (!u) {
            window.location.href = 'auth.html';
            return;
        }
        currentUser = u;
        
        // تحميل جميع المستخدمين
        const us = await db.ref('users').once('value');
        allUsers = us.val() || {};
        
        document.getElementById('loader').style.display = 'none';
        
        // التحقق من وجود معرف مستخدم في الرابط
        const params = new URLSearchParams(window.location.search);
        const targetUid = params.get('uid');
        if (targetUid) {
            openChat(targetUid);
        } else {
            showConvs();
        }
        
        // تحديث آخر ظهور كل دقيقة
        setInterval(() => {
            if (currentUser) db.ref('users/' + currentUser.uid + '/lastSeen').set(Date.now());
        }, 60000);
    });
    
    // 📋 إظهار قائمة المحادثات
    function showConvs() {
        document.getElementById('chatView').style.display = 'none';
        document.getElementById('convView').style.display = 'flex';
        chatUserId = null;
        loadConvs();
    }
    
    // 📥 تحميل قائمة المحادثات
    async function loadConvs() {
        const cl = document.getElementById('convList');
        cl.innerHTML = '';
        const snap = await db.ref('private_messages').once('value');
        const all = snap.val() || {};
        const found = new Set();
        
        Object.keys(all).forEach(cid => {
            const [u1, u2] = cid.split('_');
            const other = u1 === currentUser.uid ? u2 : (u2 === currentUser.uid ? u1 : null);
            if (other && !found.has(other) && allUsers[other]) found.add(other);
        });
        
        if (!found.size) {
            cl.innerHTML = '<div style="text-align:center;opacity:0.5;padding:40px"><i class="fas fa-comments" style="font-size:48px;color:#db2777;margin-bottom:12px;display:block"></i><p>لا توجد محادثات</p></div>';
            return;
        }
        
        found.forEach(uid => {
            const u = allUsers[uid];
            const d = document.createElement('div');
            d.className = 'conv-item';
            d.innerHTML = `
                <div class="chat-avatar"><img src="${u?.avatarUrl || (DICEBEAR_URL + '?seed=' + uid)}" alt=""></div>
                <div>
                    <div style="font-weight:600">@${u?.username || '?'} ${u?.isVerified ? '<span style="color:#f472b6;font-size:12px"><i class="fas fa-check-circle"></i></span>' : ''}</div>
                </div>`;
            d.onclick = () => openChat(uid);
            cl.appendChild(d);
        });
    }
    
    // 💬 فتح محادثة مع مستخدم
    async function openChat(uid) {
        chatUserId = uid;
        const u = allUsers[uid];
        document.getElementById('chatName').innerText = '@' + (u?.username || 'مستخدم');
        document.getElementById('chatAvatar').innerHTML = `<img src="${u?.avatarUrl || (DICEBEAR_URL + '?seed=' + uid)}" alt="">`;
        document.getElementById('convView').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';
        
        db.ref('presence/' + uid).on('value', s => {
            const online = s.val();
            document.getElementById('chatOnline').innerHTML = online
                ? '<span class="online-indicator"></span> نشط الآن'
                : 'آخر ظهور: ' + formatTime(u?.lastSeen);
        });
        
        await loadMsgs();
    }
    
    // 🔑 الحصول على معرف المحادثة
    function getChatId() {
        return [currentUser.uid, chatUserId].sort().join('_');
    }
    
    // 📥 تحميل الرسائل
    async function loadMsgs() {
        const ml = document.getElementById('msgsList');
        ml.innerHTML = '';
        if (!chatUserId) return;
        
        const snap = await db.ref('private_messages/' + getChatId()).once('value');
        const ms = snap.val() || {};
        
        Object.values(ms).sort((a, b) => a.timestamp - b.timestamp).forEach(m => {
            const sent = m.senderId === currentUser.uid;
            const d = document.createElement('div');
            d.className = 'bubble ' + (sent ? 'sent' : 'received');
            
            if (m.type === 'image') {
                d.innerHTML = `<img src="${m.imageUrl}" onclick="window.open('${m.imageUrl}','_blank')" loading="lazy"><div class="time">${new Date(m.timestamp).toLocaleTimeString('ar-SA')}</div>`;
            } else if (m.type === 'audio') {
                d.innerHTML = `<audio controls src="${m.audioUrl}"></audio><div class="time">${new Date(m.timestamp).toLocaleTimeString('ar-SA')}</div>`;
            } else {
                d.innerHTML = `${m.text}<div class="time">${new Date(m.timestamp).toLocaleTimeString('ar-SA')}</div>`;
            }
            ml.appendChild(d);
        });
        
        ml.scrollTop = ml.scrollHeight;
    }
    
    // ✉️ إرسال رسالة نصية
    async function sendMsg() {
        const inp = document.getElementById('msgInput');
        const txt = inp.value.trim();
        if (!txt || !chatUserId) return;
        
        await db.ref('private_messages/' + getChatId()).push({
            senderId: currentUser.uid,
            text: txt,
            type: 'text',
            timestamp: Date.now()
        });
        
        inp.value = '';
        await loadMsgs();
    }
    
    // 🖼️ إرسال صورة
    async function sendImage() {
        if (!chatUserId) return;
        
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/*';
        
        inp.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // ✅ عرض رسالة "تم الإرسال" داخل الدردشة
            showStatusInChat('📷 تم الإرسال');
            
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', UPLOAD_PRESET);
            
            try {
                const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {
                    method: 'POST',
                    body: fd
                });
                const data = await res.json();
                
                if (data.secure_url) {
                    await db.ref('private_messages/' + getChatId()).push({
                        senderId: currentUser.uid,
                        type: 'image',
                        imageUrl: data.secure_url,
                        timestamp: Date.now()
                    });
                    await loadMsgs();
                }
            } catch (err) {
                showToast('❌ فشل رفع الصورة');
            }
        };
        
        inp.click();
    }
    
    // 🎤 تسجيل وإرسال رسالة صوتية
    async function toggleRecording() {
        const btn = document.getElementById('btnRecord');
        if (!chatUserId) return;
        
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            // ⏹️ إيقاف التسجيل
            mediaRecorder.stop();
            btn.classList.remove('stop');
            btn.innerHTML = '<i class="fas fa-microphone"></i>';
            showToast('⏹️ تم إيقاف التسجيل');
        } else {
            // 🎙️ بدء التسجيل
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    // ✅ عرض رسالة "تم الإرسال" داخل الدردشة
                    showStatusInChat('🎤 تم الإرسال');
                    
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const fd = new FormData();
                    fd.append('file', blob, 'voice_note.webm');
                    fd.append('upload_preset', UPLOAD_PRESET);
                    
                    try {
                        const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/auto/upload', {
                            method: 'POST',
                            body: fd
                        });
                        const data = await res.json();
                        
                        if (data.secure_url) {
                            await db.ref('private_messages/' + getChatId()).push({
                                senderId: currentUser.uid,
                                type: 'audio',
                                audioUrl: data.secure_url,
                                timestamp: Date.now()
                            });
                            await loadMsgs();
                        }
                    } catch (err) {
                        showToast('❌ فشل رفع المقطع الصوتي');
                    }
                    
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                btn.classList.add('stop');
                btn.innerHTML = '<i class="fas fa-stop"></i>';
                showToast('🎤 جاري التسجيل...');
            } catch (e) {
                showToast('❌ تعذر الوصول للميكروفون');
            }
        }
    }
    
    // 📋 نسخ المحادثة
    async function copyChat() {
        if (!chatUserId) return;
        
        const snap = await db.ref('private_messages/' + getChatId()).once('value');
        const msgs = snap.val() || {};
        let text = '💬 محادثة MNAENCA\n' + '─'.repeat(30) + '\n';
        
        Object.values(msgs).sort((a, b) => a.timestamp - b.timestamp).forEach(m => {
            const sender = m.senderId === currentUser.uid ? 'أنت' : (allUsers[m.senderId]?.username || 'مستخدم');
            const content = m.type === 'image' ? '[صورة 📷]' : m.type === 'audio' ? '[رسالة صوتية 🎤]' : m.text;
            const time = new Date(m.timestamp).toLocaleTimeString('ar-SA');
            text += `\n${sender} (${time}):\n${content}\n`;
        });
        
        try {
            await navigator.clipboard.writeText(text);
            showToast('✅ تم نسخ المحادثة');
        } catch (e) {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('✅ تم نسخ المحادثة');
        }
    }
    
    // 🔔 إظهار إشعار
    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }
    
    // ⏰ تنسيق الوقت
    function formatTime(ts) {
        if (!ts) return 'غير معروف';
        const diff = Date.now() - ts;
        const mins = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (mins < 1) return 'الآن';
        if (mins < 60) return 'منذ ' + mins + ' دقيقة';
        if (hours < 24) return 'منذ ' + hours + ' ساعة';
        if (days < 7) return 'منذ ' + days + ' يوم';
        return new Date(ts).toLocaleDateString('ar-SA');
    }
    
    console.log('🌸 MNAENCA Chat Ready - Voice & Image Support ✨');
</script>
</body>
</html>
